name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  
  # 💡 手動実行（Actionsタブからボタンぽちで実行）を有効化
  workflow_dispatch:
    inputs:
      tag_name:
        description: '作成・追加先のリリースタグ名 (例: v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install libsndfile

      - name: Configure Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTMSEXPRESS_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          # 💡 手動実行時に入力したタグ名を優先し、通常プッシュ時は自動でその時のタグ名を使う設定
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
