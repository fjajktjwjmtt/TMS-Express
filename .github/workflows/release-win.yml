name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ マクロを一切廃止し、安全に行単位で関数呼び出し引数のみを書き換えます
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $lines = Get-Content $file
              $newLines = @()

              foreach ($line in $lines) {
                  # Qtのヘッダーなどを汚染しないよう、関数呼び出しの特定の形だけを置換
                  
                  # 1. audioBuffer.render(...) への path 渡しを .string() に
                  if ($line -match 'audioBuffer\s*\.\s*render\s*\(') {
                      if ($line -match 'filename' -and -not $line -match '\.string\(\)') {
                          $line = $line -replace 'filename', 'filename.string()'
                      }
                  }
                  
                  # 2. synthesizer.render(...) への path 渡しを .string() に
                  if ($line -match 'synthesizer\s*\.\s*render\s*\(') {
                      if ($line -match 'outputPath' -and -not $line -match '\.string\(\)') {
                          $line = $line -replace 'outputPath', 'outputPath.string()'
                      }
                      if ($line -match 'filename' -and -not $line -match '\.string\(\)') {
                          $line = $line -replace 'filename', 'filename.string()'
                      }
                  }

                  # 3. QUrl::fromLocalFile(...) への path 渡しを wstring 経由で QString 化
                  if ($line -match 'QUrl\s*::\s*fromLocalFile\s*\(\s*filename\s*\)') {
                      $line = $line -replace 'QUrl\s*::\s*fromLocalFile\s*\(\s*filename\s*\)', 'QUrl::fromLocalFile(QString::fromStdWString(filename.wstring()))'
                  }
                  if ($line -match 'QUrl\s*::\s*fromLocalFile\s*\(\s*outputPath\s*\)') {
                      $line = $line -replace 'QUrl\s*::\s*fromLocalFile\s*\(\s*outputPath\s*\)', 'QUrl::fromLocalFile(QString::fromStdWString(outputPath.wstring()))'
                  }

                  $newLines += $line
              }
              
              Set-Content $file $newLines
              Write-Host "Successfully patched target lines safely in MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc /Zc:__cplusplus"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
