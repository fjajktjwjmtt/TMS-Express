name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 修正：壊れやすい正規表現をやめ、特定のパス変数名だけを安全に変換
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $content = Get-Content $file -Raw
              
              # 1. 関数引数に紛れ込んだ誤置換を一旦すべて綺麗にリセット
              $content = $content -replace '\.string\(\)\.string\(\)', '.string()'
              
              # 2. 以前の広範囲な置換によるバグを防ぐため、特定のファイルパスの変数だけに絞って置換を適用
              # 呼び出しで使われている可能性の高い path / filename / filePath などの変数に限定して .string() 化
              $content = $content -replace ',\s*path\s*,', ', path.string(),'
              $content = $content -replace ',\s*filename\s*,', ', filename.string(),'
              $content = $content -replace ',\s*outputPath\s*,', ', outputPath.string(),'
              
              # AudioBuffer::render(path) のように引数が1つだけの場合のケア
              $content = $content -replace '\.render\(path\)', '.render(path.string())'
              $content = $content -replace '\.render\(filename\)', '.render(filename.string())'
              
              # 3. QUrl::fromLocalFile のエラー対応 (安全に文字列経由にする)
              $content = $content -replace 'QUrl::fromLocalFile\((path|filename|outputPath)\)', 'QUrl::fromLocalFile(QString::fromStdWString(($1).wstring()))'
              
              Set-Content $file $content -NoNewline
              Write-Host "Successfully patched MainWindow.cpp safely!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
