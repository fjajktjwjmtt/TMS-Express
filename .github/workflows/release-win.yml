name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '作成・追加先のリリースタグ名 (例: v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      # 💡 CMakeLists.txt の中から Windows でエラーになる警告オプションを物理的に消し去る
      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 追加: MainWindow.cpp の Windows 固有のパス型ミスマッチを自動でパッチするステップ
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $content = Get-Content $file
              
              # 265行目: render(path) -> render(path.string()) に置換
              $content[264] = $content[264] -replace 'render\(([^,)]+)\)', 'render(($1).string())'
              
              # 269行目: .c_str() または .native().c_str() -> .string().c_str() に置換
              $content[268] = $content[268] -replace '\.native\(\)\.c_str\(\)', '.string().c_str()'
              $content[268] = $content[268] -replace '\.c_str\(\)', '.string().c_str()'
              
              # 302行目: render(arg1, path) -> render(arg1, path.string()) に置換
              $content[301] = $content[301] -replace 'render\(([^,]+),\s*([^,)]+)', 'render($1, ($2).string()'
              
              # 308行目: .c_str() または .native().c_str() -> .string().c_str() に置換
              $content[307] = $content[307] -replace '\.native\(\)\.c_str\(\)', '.string().c_str()'
              $content[307] = $content[307] -replace '\.c_str\(\)', '.string().c_str()'
              
              Set-Content $file $content
              Write-Host "Successfully patched MainWindow.cpp for Windows compatibility!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
