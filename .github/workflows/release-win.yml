Name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '作成・追加先のリリースタグ名 (例: v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      # 💡 CMakeLists.txt の中から Windows でエラーになる警告オプションを物理的に消し去る
      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 自動修正: Synthesizer::render の引数を path から path.string() に変換する
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $content = Get-Content $file
              
              # 302行目の error C2664 対策: render の第2引数に .string() を付与する安全な置換
              # render(引数1, 引数2, ...) の2番目の引数を自動検知して .string() に書き換えます
              $content = $content -replace '(\.render\([^,]+,\s*)([^,)]+)', '$1($2).string()'
              
              # その他の.c_str()の互換性維持
              $content = $content -replace '\.native\(\)\.c_str\(\)', '.string().c_str()'
              
              Set-Content $file $content
              Write-Host "Successfully patched MainWindow.cpp for Windows compatibility!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
