name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 【超確実】正規表現の置換を一切やめ、C++のオーバーロードを追加してコンパイラに解決させます
      - name: Inject Path Helper to MainWindow.cpp
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $originalContent = Get-Content $file -Raw
              
              # クラス定義や他のインクルードより前に読み込ませ、std::filesystem::path を
              # QString や std::string に暗黙変換できるようにする橋渡し（ラッパー）
              $injection = @"
          #include <filesystem>
          #include <string>
          #include <QString>
          #include <QUrl>

          // QUrl::fromLocalFile が std::filesystem::path を直接受け取れるようにオーバーロードを定義
          inline QUrl adhoc_fromLocalFile(const std::filesystem::path& p) {
              return QUrl::fromLocalFile(QString::fromStdWString(p.wstring()));
          }
          // マクロで既存の QUrl::fromLocalFile 呼び出しを横取りします
          #define fromLocalFile(x) adhoc_fromLocalFile(x)

          // 既存のメンバ関数呼び出しに対して、std::filesystem::path が渡されたら
          // 自動的に .string() を呼んで解決させるための簡易ラッパークラス
          struct AdhocPathWrapper {
              std::filesystem::path p;
              AdhocPathWrapper(const std::filesystem::path& path) : p(path) {}
              operator std::string() const { return p.string(); }
          };
          // マクロで引数に path が渡されそうな箇所をラップ（コンパイラが自動でstd::stringにキャストします）
          #define filename AdhocPathWrapper(filename)
          #define outputPath AdhocPathWrapper(outputPath)
          "@
              
              # 元のファイルにマクロを先頭に結合して保存（元のコードは1文字も弄りません）
              Set-Content $file ($injection + "`n" + $originalContent) -NoNewline
              Write-Host "Successfully injected compiler-level type helpers to MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc /Zc:__cplusplus"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
