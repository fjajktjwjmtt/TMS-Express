name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 実際のコード構造（.c_str() の有無など）に完全対応させた確実な置換処理
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $content = Get-Content $file -Raw

              # 1. audioBuffer.render(...) の引数を .string() に統一
              $content = $content -replace 'audioBuffer\s*\.\s*render\s*\(\s*filename(?:\.c_str\(\))?\s*\)', 'audioBuffer.render(filename.string())'

              # 2. synthesizer.render(..., path, ...) の第2引数を .string() に統一
              $content = $content -replace 'synthesizer\s*\.\s*render\s*\(\s*([^,]+)\s*,\s*outputPath(?:\.c_str\(\))?', 'synthesizer.render($1, outputPath.string()'

              # 3. QUrl::fromLocalFile(...) の中身がどんな形であれ、Windowsで安全な wstring / wchar_t 経由でQString化
              $content = $content -replace 'QUrl\s*::\s*fromLocalFile\s*\(\s*filename(?:\.c_str\(\))?\s*\)', 'QUrl::fromLocalFile(QString::fromStdWString(filename.wstring()))'
              $content = $content -replace 'QUrl\s*::\s*fromLocalFile\s*\(\s*outputPath(?:\.c_str\(\))?\s*\)', 'QUrl::fromLocalFile(QString::fromStdWString(outputPath.wstring()))'

              Set-Content $file $content -NoNewline
              Write-Host "Successfully applied precise pattern patches to MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc /Zc:__cplusplus"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
