name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 【最終版】変数名を推測せず、カッコ内の引数構造そのものをキャプチャして型キャストで包みます
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $lines = Get-Content $file
              for ($i = 0; $i -lt $lines.Count; $i++) {
                  # 1. audioBuffer.render( 任意の引数 ) の置換
                  # 引数を std::filesystem::path で包んでから .string() に変換
                  if ($lines[$i] -match 'audioBuffer\.render\s*\(' -and $lines[$i] -notmatch 'std::filesystem::path') {
                      $lines[$i] = [regex]::Replace($lines[$i], 'audioBuffer\.render\s*\((.*?)\)', 'audioBuffer.render(std::filesystem::path($1).string())')
                  }
                  
                  # 2. synthesizer.render( 第1引数, 第2引数(ここがパス), 残りの引数 ) の置換
                  if ($lines[$i] -match 'synthesizer\.render\s*\(' -and $lines[$i] -notmatch 'std::filesystem::path') {
                      $lines[$i] = [regex]::Replace($lines[$i], 'synthesizer\.render\s*\((.*?),\s*(.*?),\s*(.*)', 'synthesizer.render($1, std::filesystem::path($2).string(), $3')
                  }

                  # 3. QUrl::fromLocalFile( 任意の引数.c_str() ) の置換
                  # Windows特有の wchar_t 問題を回避するため、wstring を経由して QString 化
                  if ($lines[$i] -match 'QUrl::fromLocalFile\s*\(' -and $lines[$i] -match '\.c_str\(\)') {
                      $lines[$i] = [regex]::Replace($lines[$i], 'QUrl::fromLocalFile\s*\((.*?)\.c_str\(\)\s*\)', 'QUrl::fromLocalFile(QString::fromStdWString(std::filesystem::path($1).wstring()))')
                  }
              }
              Set-Content $file $lines
              Write-Host "Successfully applied struct-aware type patches to MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc /Zc:__cplusplus"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/
