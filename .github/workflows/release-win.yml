name: Build & Release (Windows)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

# 403エラー対策の書き込み権限許可
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 変数名やポインタ(->)に関わらず、対象のrender関数を確実に仕留めるパッチ
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $lines = Get-Content $file
              for ($i = 0; $i -lt $lines.Count; $i++) {
                  
                  # 1. 引数が1つの render(...) をキャッチして (パス).string() に変換
                  if ($lines[$i] -match '(?:\.|->)render\s*\([^,]+\)' -and $lines[$i] -notmatch '\.string\(\)') {
                      $lines[$i] = [regex]::Replace($lines[$i], '((?:\.|->)render\s*)\((.*?)\)', '$1(($2).string())')
                  }
                  
                  # 2. 引数が4つの render(a, b, c, d) をキャッチして 第2引数に .string() を付与
                  if ($lines[$i] -match '(?:\.|->)render\s*\(.*?,.*?,.*?,.*?\)' -and $lines[$i] -notmatch '\.string\(\)') {
                      $lines[$i] = [regex]::Replace($lines[$i], '((?:\.|->)render\s*\([^,]+,\s*)([^,]+)(,\s*[^,]+,\s*[^)]+\))', '$1($2).string()$3')
                  }
                  
                  # 3. QUrl::fromLocalFile のワイド文字対策
                  if ($lines[$i] -match 'QUrl::fromLocalFile\s*\(' -and $lines[$i] -notmatch 'QString::fromStd') {
                      if ($lines[$i] -match 'QUrl::fromLocalFile\s*\((.*?)\.c_str\(\)\)') {
                          $lines[$i] = [regex]::Replace($lines[$i], 'QUrl::fromLocalFile\s*\((.*?)\.c_str\(\)\)', 'QUrl::fromLocalFile(QString::fromStdString($1.string()))')
                      } else {
                          $lines[$i] = [regex]::Replace($lines[$i], 'QUrl::fromLocalFile\s*\((.*?)\)', 'QUrl::fromLocalFile(QString::fromStdString(($1).string()))')
                      }
                  }
              }
              Set-Content $file $lines
              Write-Host "Successfully applied robust wildcard path conversion patches to MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc /Zc:__cplusplus"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      # 💡 【新規追加】windeployqt を使って、EXEの隣に必要なDLLやプラグインを全部自動コピーする
      - name: Deploy Qt Runtime DLLs
        shell: pwsh
        run: |
          windeployqt --release build/Release/tmsexpress.exe

      # DLLが全部詰まったフォルダごとまとめてZIP化
      - name: Package Build Artifact
        shell: pwsh
        run: Compress-Archive -Path build/Release/* -DestinationPath build-windows.zip -Force

      # リリースにアタッチ
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: build-windows.zip
