name: Build & Release (Windows)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install Dependencies
        run: |
          choco install pkgconfiglite
          vcpkg install libsndfile:x64-windows

      - name: Patch CMakeLists.txt for MSVC
        run: |
          (Get-Content CMakeLists.txt) -replace '-Wextra', '' -replace '-Wall', '' -replace '-Wpedantic', '' | Set-Content CMakeLists.txt

      # 🛠️ 修正：エラーログの型ミスマッチ箇所をピンポイントで安全に文字列（またはwstring）へ変換
      - name: Patch MainWindow.cpp for Windows Path Conversions
        shell: pwsh
        run: |
          $file = "src/ui/gui/MainWindow.cpp"
          if (Test-Path $file) {
              $content = Get-Content $file -Raw
              
              # 1. 265行目: AudioBuffer::render(path) -> .string()化
              $content = $content -replace 'audioBuffer\.render\(path\)', 'audioBuffer.render(path.string())'
              
              # 2. 269行目: QUrl::fromLocalFile(path) -> QString::fromStdWString で Windows のパス（wchar_t）に対応
              $content = $content -replace 'QUrl::fromLocalFile\(path\)', 'QUrl::fromLocalFile(QString::fromStdWString(path.wstring()))'
              
              # 3. 302行目: Synthesizer::render(..., outputPath, ...) -> .string()化
              $content = $content -replace ',\s*outputPath\s*,', ', outputPath.string(),'
              
              # 4. 308行目: QUrl::fromLocalFile(outputPath) -> 上記同様に wstring 経由で変換
              $content = $content -replace 'QUrl::fromLocalFile\(outputPath\)', 'QUrl::fromLocalFile(QString::fromStdWString(outputPath.wstring()))'
              
              Set-Content $file $content -NoNewline
              Write-Host "Successfully applied exact patches to MainWindow.cpp!"
          } else {
              Write-Error "MainWindow.cpp not found!"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DTMSEXPRESS_BUILD_TESTS=OFF",
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_CXX_FLAGS=/D_USE_MATH_DEFINES /EHsc"
          )
          cmake @cmakeArgs
        env:
          PKG_CONFIG_PATH: C:/vcpkg/installed/x64-windows/lib/pkgconfig

      - name: Build
        run: cmake --build build --config Release

      - name: Package Build Artifact
        run: |
          Compress-Archive -Path "${{github.workspace}}/build/Release/tmsexpress.exe" -DestinationPath "${{github.workspace}}/build-windows.zip"

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{github.workspace}}/build-windows.zip
